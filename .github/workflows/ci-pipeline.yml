name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 1. Clonación del repositorio.(Fork)
# 2. Ejecutar SAST -> Usar SonarCloud o herramienta similar.
# 3. Ejecutar SCA ->Usar Dependency Check o similar.
# 4. Construcción de la Imagen Docker.
# 5. Image Security -> Usar Trivy o similar.
# 6. Despliegue de la aplicación -> Puede utilizar Minikube o Docker de su
# equipo(notebook).

jobs:
  # Llamar al análisis de SonarCloud
  sonarcloud:
    uses: ./.github/workflows/sonarcloud.yml

  # Llamar al análisis SonarCloud
  sca:
    uses: ./.github/workflows/sca.yml
    needs: sonarcloud # Ejecuta este job después del SCA

  # Llamar a la construcción de Docker
  docker-build:
    uses: ./.github/workflows/build.yml
    needs: sonarcloud # Ejecuta este job después de SonarCloud
