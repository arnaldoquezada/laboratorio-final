name: SonarCloud Analysis

on:
  workflow_call:

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      # 3. Descargar y ejecutar SonarScanner con `-X`
      - name: SonarCloud Scan with Debug
        run: |
          sonar-scanner \
            -Dsonar.projectKey=arnaldoquezada-personal_laboratorio-final \
            -Dsonar.organization=arnaldoquezada-personal \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=. \
            -X
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
