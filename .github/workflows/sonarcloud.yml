name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarCloudTrigger:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin" # Utilizando Temurin JDK
          java-version: "17"

      # 3. Ejecutar la acción oficial de SonarQube
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=arnaldoquezada-personal_laboratorio-final
            -Dsonar.organization=arnaldoquezada-personal
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.

        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
