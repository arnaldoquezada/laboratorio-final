name: Build, Scan, and Push Docker Image

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  build-and-scan:
    name: Build, Scan, and Push
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t arnaldoquezada/laboratorio-final:${{ github.sha }} .

      # 4. Run Trivy Vulnerability Scanner (always generate report)
      - name: Run Trivy Vulnerability Scanner
        id: trivy-scan
        uses: aquasecurity/trivy-action@0.29.0
        continue-on-error: true # No falla inmediatamente si encuentra vulnerabilidades
        with:
          image-ref: "arnaldoquezada/laboratorio-final:${{ github.sha }}"
          format: "template"
          template: ".github/templates/html.tpl"
          output: "trivy-report.html"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"

      # 5. Upload Trivy Report as an Artifact
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v3
        with:
          name: trivy-report
          path: trivy-report.html

      # 6. Fail the pipeline if vulnerabilities are found
      - name: Check for Vulnerabilities
        run: |
          echo "Failing pipeline due to vulnerabilities found by Trivy."
          exit 1
        if: failure() # Este paso se ejecuta solo si Trivy encuentra vulnerabilidades

      # 7. Push Docker image (only if no vulnerabilities are found)
      - name: Push Docker Image
        if: steps.trivy-scan.outcome == 'success'
        run: |
          docker push arnaldoquezada/laboratorio-final:${{ github.sha }}
