name: Build, Scan and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    name: Build, Scan and Push Docker Image

    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t arnaldoquezada/laboratorio-final:latest .

      # 4. Run Trivy Vulnerability Scanner
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.31.3
        with:
          image-ref: "arnaldoquezada/laboratorio-final:latest"
          format: "table"
          exit-code: "1" # Hacer fallar el pipeline si hay vulnerabilidades
          ignore-unfixed: true # Ignorar vulnerabilidades sin solución conocida
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM" # Especificar las severidades que fallan el pipeline

      # 5. Push Docker Image (solo si no hay vulnerabilidades críticas, altas o medias)
      - name: Push Docker Image
        if: ${{ success() }} # Solo ejecutar si los pasos anteriores son exitosos
        run: |
          docker push arnaldoquezada/laboratorio-final:latest
