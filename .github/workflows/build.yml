name: Build, Scan, and Push Docker Image

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true
jobs:
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t arnaldoquezada/laboratorio-final:${{ github.sha }} .

      # 4. Run Trivy vulnerability scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "arnaldoquezada/laboratorio-final:${{ github.sha }}"
          format: "table"
          exit-code: "1" # Falla si encuentra vulnerabilidades críticas o altas
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # 5. Push Docker image (only if Trivy scan passes)
      - name: Push Docker Image
        if: success() # Este paso solo se ejecuta si el análisis de Trivy pasa
        run: |
          docker push arnaldoquezada/laboratorio-final:${{ github.sha }}
